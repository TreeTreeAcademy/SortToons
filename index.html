<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dandy's World: 分类大冒险</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        body { font-family: 'ZCOOL+KuaiLe', cursive; background-color: #000; color: white; overflow: hidden; margin: 0; }
        
        .dandy-border { border: 6px solid #FFD700; box-shadow: 4px 4px 0px #000; }
        .btn-pink { background-color: #FF69B4; border-bottom: 6px solid #C71585; transition: all 0.1s; cursor: pointer; }
        .btn-pink:active { border-bottom-width: 0px; transform: translateY(6px); }

        .glitch-overlay { display: none; position: fixed; inset: 0; z-index: 50; pointer-events: none; background: radial-gradient(circle, rgba(255,0,0,0.4) 0%, rgba(255,0,0,0.8) 100%); animation: flash 0.1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* 卡通房子视觉设计 */
        .toon-house { position: relative; width: 150px; transition: transform 0.3s; pointer-events: auto; }
        .room-active { transform: scale(1.15); filter: brightness(1.2); }

        .house-roof { 
            position: absolute; top: -55px; left: -5px; width: 160px; height: 60px;
            background-color: inherit; filter: brightness(0.85);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border-bottom: 8px solid #FFD700; z-index: 2;
        }

        .house-body { 
            position: relative; width: 100%; height: 160px;
            background-color: inherit; border: 6px solid #FFD700; border-radius: 0 0 15px 15px;
            box-shadow: 6px 6px 0 #000; display: flex; flex-direction: column; items: center; z-index: 1;
        }

        .chimney-brick-tall { position: absolute; top: -95px; right: 15px; width: 28px; height: 50px; background: repeating-linear-gradient(0deg, #8b4513 0px, #8b4513 8px, #a0522d 8px, #a0522d 10px); border: 4px solid #fff; border-radius: 5px 5px 0 0; z-index: 0; }
        .chimney-brick-short { position: absolute; top: -80px; right: 10px; width: 35px; height: 35px; background: repeating-linear-gradient(0deg, #8b4513 0px, #8b4513 8px, #a0522d 8px, #a0522d 10px); border: 4px solid #fff; border-radius: 5px 5px 0 0; z-index: 0; }

        .window-round { width: 45px; height: 45px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.3); margin-top: 25px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }
        .window-square { width: 45px; height: 45px; border: 4px solid #fff; background: rgba(255,255,255,0.3); margin-top: 25px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

        .toon-win { transform: scale(0) rotate(720deg); transition: all 0.8s ease-in; }
        .toon-wrong { animation: shake 0.5s; filter: sepia(1) saturate(10000%) hue-rotate(-50deg); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <div id="glitch" class="glitch-overlay"></div>

    <section id="scene1" class="h-screen w-full flex flex-col items-center justify-center bg-cover bg-center" style="background-image: url('Scene 1.png');">
        <div class="bg-black/80 p-8 dandy-border max-w-lg w-full text-center">
            <h1 class="text-4xl mb-6 text-yellow-400">词汇输入</h1>
            <textarea id="wordInput" class="w-full h-32 p-4 text-black rounded mb-4" placeholder="输入本课词汇..."></textarea>
            <button onclick="initGame()" class="btn-pink w-full py-4 text-2xl font-bold">开启冒险</button>
        </div>
    </section>

    <section id="scene2" class="hidden h-screen w-full flex flex-col items-center justify-center bg-cover bg-center" style="background-image: url('Scene 2.png');">
        <div class="bg-black/85 p-6 dandy-border max-w-4xl w-full text-center">
            <h1 class="text-3xl mb-4 text-yellow-400">配置卡通房子</h1>
            <div id="roomList" class="space-y-3 max-h-80 overflow-y-auto mb-4 p-2 text-left text-sm"></div>
            <div class="flex gap-4">
                <button onclick="addRoom()" class="bg-blue-600 flex-1 py-2 rounded text-white font-bold text-lg">增加房间</button>
                <button onclick="startGame()" class="btn-pink flex-1 py-2 text-xl font-bold">进入挑战</button>
            </div>
        </div>
    </section>

    <section id="scene3" class="hidden h-screen w-full relative bg-cover bg-center" style="background-image: url('Scene 3.png');">
        <div class="absolute top-0 w-full p-4 flex justify-between items-center bg-black/60 border-b-4 border-yellow-500 z-10">
            <div class="text-xl font-bold">待分类: <span id="remCount">0</span></div>
            <div id="timer" class="text-5xl text-red-500 font-bold italic">10</div>
            <div class="text-xl font-bold">得分: <span id="score">0</span></div>
        </div>
        <div id="gameRooms" class="absolute bottom-48 w-full flex justify-around px-8"></div>
        <div id="toonContainer" class="absolute bottom-10 left-1/2 -translate-x-1/2">
            <div id="activeToon" class="w-40 h-40 bg-contain bg-no-repeat bg-center cursor-grab relative" draggable="true">
                <div id="statusLabel" class="absolute -top-12 left-1/2 -translate-x-1/2 whitespace-nowrap text-2xl font-bold"></div>
                <div id="wordLabel" class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-black/70 px-4 py-1 rounded-full border-2 border-yellow-500 text-xl font-bold"></div>
            </div>
        </div>
    </section>

    <section id="scene4" class="hidden h-screen w-full flex flex-col items-center justify-center bg-cover bg-center" style="background-image: url('Scene 4.png');">
        <div class="bg-black/90 p-12 dandy-border text-center">
            <h1 id="resultTitle" class="text-6xl mb-8"></h1>
            <div id="effectArea" class="text-4xl mb-8"></div>
            <button onclick="location.reload()" class="btn-pink px-12 py-4 text-2xl font-bold">回到大厅</button>
        </div>
    </section>

    <script>
        const API_KEY = "AIzaSyDQ93HIITLTF8FMIKyggLN496c7gLw7Sf8";
        const TOONS = ['astro.png', 'boxten.png', 'brightney.png', 'connie.png', 'cosmo.png', 'finn.png', 'flutter.png', 'gigi.png', 'glisten.png', 'goob.png', 'looey.png', 'pebble.png', 'poppy-.png', 'razzle.png', 'rodger.png', 'scraps.png', 'shelly.png', 'shrimpo.png', 'sprout.png', 'teagan.png', 'tisha.png', 'toodles.png', 'vee.png'];

        const COLOR_MAP = { "红色": "#ff4d4d", "蓝色": "#4db8ff", "绿色": "#4dff88", "棕色": "#8b4513", "紫色": "#9370db", "黄色": "#ffff4d" };

        const LOCAL_KNOWLEDGE = {
            "爱好": ["滑冰", "滑雪", "打羽毛球", "打排球", "打乒乓球", "钓鱼"],
            "家人": ["爷爷", "奶奶"],
            "天气": ["冬天", "夏天", "春天", "秋天", "冷", "热"],
            "件": ["毛衣", "衬衫", "外套", "大衣"],
            "条": ["牛仔裤", "围巾", "领带", "皮带"],
            "双": ["运动鞋", "袜子", "筷子", "凉鞋", "拖鞋"],
            "块": ["手表", "巧克力", "香皂"],
            "副": ["眼镜", "耳机", "手套", "耳环"]
        };

        let words = [], rooms = [
            {name:'件', colorName:'红色', window:'square', chimney:'brick-tall'},
            {name:'条', colorName:'蓝色', window:'round', chimney:'brick-short'},
            {name:'双', colorName:'棕色', window:'square', chimney:'none'}
        ];
        let currentWord = "", score = 0, timerVal = 10, interval, audioCtx;

        const Sound = {
            play(freq, type, dur) {
                if (!audioCtx) return;
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + dur);
            },
            tick() { this.play(250, 'square', 0.1); },
            win() { this.play(523, 'triangle', 0.2); setTimeout(()=>this.play(659, 'triangle', 0.3), 100); },
            fail() { this.play(110, 'sawtooth', 1.0); }
        };

        function initGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const val = document.getElementById('wordInput').value;
            words = val.split(/[\s,，\n]+/).filter(w => w.trim());
            if(!words.length) return alert("请输入词汇！");
            renderRoomSettings();
            showScene('scene2');
        }

        function showScene(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function renderRoomSettings() {
            const list = document.getElementById('roomList');
            list.innerHTML = rooms.map((r, i) => `
                <div class="grid grid-cols-4 gap-2 items-center bg-zinc-800 p-2 rounded border border-gray-600">
                    <input type="text" value="${r.name}" onchange="rooms[${i}].name=this.value" class="p-1 text-black font-bold rounded">
                    <select onchange="rooms[${i}].colorName=this.value" class="text-black p-1 rounded font-bold">
                        ${Object.keys(COLOR_MAP).map(c => `<option value="${c}" ${r.colorName===c?'selected':''}>${c}</option>`).join('')}
                    </select>
                    <select onchange="rooms[${i}].window=this.value" class="text-black p-1 rounded font-bold">
                        <option value="round" ${r.window==='round'?'selected':''}>圆窗</option>
                        <option value="square" ${r.window==='square'?'selected':''}>方窗</option>
                        <option value="none" ${r.window==='none'?'selected':''}>无窗</option>
                    </select>
                    <div class="flex gap-1 items-center">
                        <select onchange="rooms[${i}].chimney=this.value" class="text-black p-1 rounded font-bold flex-1">
                            <option value="brick-tall" ${r.chimney==='brick-tall'?'selected':''}>高烟囱</option>
                            <option value="brick-short" ${r.chimney==='brick-short'?'selected':''}>矮烟囱</option>
                            <option value="none" ${r.chimney==='none'?'selected':''}>无烟囱</option>
                        </select>
                        <button onclick="rooms.splice(${i},1);renderRoomSettings()" class="text-red-500 font-bold px-1 text-xl">×</button>
                    </div>
                </div>
            `).join('');
        }

        function addRoom() { rooms.push({name:'新分类', colorName:'黄色', window:'none', chimney:'none'}); renderRoomSettings(); }

        function startGame() {
            showScene('scene3');
            renderGameRooms();
            nextWord();
        }

        function renderGameRooms() {
            const container = document.getElementById('gameRooms');
            container.innerHTML = rooms.map(r => {
                const hexColor = COLOR_MAP[r.colorName] || "#ffffff";
                return `
                <div class="toon-house room-target" data-name="${r.name}" style="background-color: ${hexColor}">
                    ${r.chimney!=='none'?`<div class="chimney-${r.chimney}"></div>`:''}
                    <div class="house-roof"></div>
                    <div class="house-body">
                        ${r.window!=='none'?`<div class="window-${r.window}"></div>`:''}
                        <span class="absolute bottom-4 bg-black/80 px-2 py-1 rounded border border-white text-sm font-bold text-yellow-400">${r.name}</span>
                    </div>
                </div>`;
            }).join('');
            setupDragAndDrop();
        }

        function nextWord() {
            if(!words.length) return endGame(true);
            currentWord = words.shift();
            document.getElementById('remCount').innerText = words.length;
            const toon = document.getElementById('activeToon');
            toon.className = "w-40 h-40 bg-contain bg-no-repeat bg-center cursor-grab relative";
            toon.style.backgroundImage = `url('${TOONS[Math.floor(Math.random()*TOONS.length)]}')`;
            toon.style.transform = "none";
            document.getElementById('wordLabel').innerText = currentWord;
            document.getElementById('statusLabel').innerText = "";
            startTimer();
        }

        function startTimer() {
            timerVal = 10; clearInterval(interval);
            document.getElementById('timer').innerText = "10";
            interval = setInterval(() => {
                timerVal--; 
                document.getElementById('timer').innerText = timerVal < 10 ? `0${timerVal}` : timerVal;
                Sound.tick(); if(timerVal <= 0) triggerTwisted();
            }, 1000);
        }

        function setupDragAndDrop() {
            const toon = document.getElementById('activeToon');
            const targets = document.querySelectorAll('.room-target');
            toon.ondragstart = (e) => e.dataTransfer.setData('text', 'toon');
            targets.forEach(t => {
                t.ondragover = (e) => { e.preventDefault(); t.classList.add('room-active'); };
                t.ondragleave = () => t.classList.remove('room-active');
                t.ondrop = (e) => { e.preventDefault(); t.classList.remove('room-active'); handleDrop(t.dataset.name); };
            });
        }

        async function handleDrop(cat) {
            clearInterval(interval);
            const status = document.getElementById('statusLabel');
            status.innerText = "判定中...";
            status.className = "absolute -top-12 left-1/2 -translate-x-1/2 text-yellow-400 animate-pulse font-bold text-2xl";
            const isCorrect = await checkLogic(currentWord, cat);
            if(isCorrect) {
                status.innerText = "✓ 正确!";
                status.className = "absolute -top-12 left-1/2 -translate-x-1/2 text-green-400 font-bold text-3xl";
                document.getElementById('activeToon').classList.add('toon-win');
                score += 10; document.getElementById('score').innerText = score;
                Sound.win(); setTimeout(nextWord, 800);
            } else {
                status.innerText = "❌ 错误!";
                status.className = "absolute -top-12 left-1/2 -translate-x-1/2 text-red-500 font-bold text-3xl";
                document.getElementById('activeToon').classList.add('toon-wrong');
                Sound.fail(); triggerTwisted();
            }
        }

        async function checkLogic(w, c) {
            if (LOCAL_KNOWLEDGE[c] && LOCAL_KNOWLEDGE[c].includes(w)) return true;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `判定词汇"${w}"是否属于"${c}"分类? 只回答"是"或"否"内容。` }] }] })
                });
                const d = await res.json();
                return d.candidates[0].content.parts[0].text.includes("是");
            } catch { return false; }
        }

        function triggerTwisted() {
            clearInterval(interval); document.getElementById('glitch').style.display = 'block';
            setTimeout(() => { document.getElementById('glitch').style.display = 'none'; endGame(false); }, 1200);
        }

        function endGame(win) {
            showScene('scene4');
            const title = document.getElementById('resultTitle'), fx = document.getElementById('effectArea');
            if(win) {
                title.innerText = "闯关成功!"; title.className = "text-6xl mb-8 text-green-400"; fx.innerText = "🌸🌸🌸🌸🌸";
            } else {
                title.innerText = "继续加油!"; title.className = "text-6xl mb-8 text-red-600"; fx.innerText = "💪💪💪💪💪";
            }
        }
    </script>
</body>
</html>
